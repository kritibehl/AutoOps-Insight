name: AutoOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  autoops-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke check CLI
        run: |
          python cli.py health

      - name: Analyze sample logs
        run: |
          python cli.py analyze sample.log
          python cli.py analyze sample.log --no-print-json
          python cli.py analyze sample_dependency.log

      - name: Generate report artifacts
        run: |
          python cli.py report

      - name: Show generated markdown report
        run: |
          echo "===== GENERATED REPORT ====="
          cat reports/generated/latest_report.md

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: autoops-reports
          path: |
            reports/generated/latest_report.md
            reports/generated/latest_report.json
            autoops.db
